name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -s bash
        with:
          severity: warning
          additional_paths: scripts install.sh tests evals

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            collect-diff-context-cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('collect-diff-context-cli/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: collect-diff-context-cli
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: collect-diff-context-cli
      - name: Compile release binary
        run: cargo build --release
        working-directory: collect-diff-context-cli

  integration-tests:
    runs-on: ubuntu-latest
    needs: [rust-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            collect-diff-context-cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('collect-diff-context-cli/Cargo.lock') }}
      - name: Run collect_diff_context_test.sh
        run: ./tests/collect_diff_context_test.sh
      - name: Run parity_golden_test.sh
        run: ./tests/parity_golden_test.sh
