name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -s bash
        with:
          severity: warning
          additional_paths: scripts install.sh tests evals

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            collect-diff-context-cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('collect-diff-context-cli/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: collect-diff-context-cli
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: collect-diff-context-cli
      - name: Run unit tests
        run: cargo test
        working-directory: collect-diff-context-cli
      - name: Compile release binary
        run: cargo build --release
        working-directory: collect-diff-context-cli

  integration-tests:
    runs-on: ubuntu-latest
    needs: [rust-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            collect-diff-context-cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('collect-diff-context-cli/Cargo.lock') }}
      - name: Run collect_diff_context_test.sh
        run: ./tests/collect_diff_context_test.sh
      - name: Run parity_golden_test.sh
        run: ./tests/parity_golden_test.sh
      - name: Validate JSON schemas
        run: |
          pip install jsonschema
          python3 -c "
import json, jsonschema, pathlib, sys
schema_dir = pathlib.Path('collect-diff-context-cli/schemas')
errors = 0
for schema_file in sorted(schema_dir.glob('*.schema.json')):
    try:
        schema = json.loads(schema_file.read_text())
        jsonschema.Draft202012Validator.check_schema(schema)
        print(f'  ✅ {schema_file.name}: valid schema')
    except Exception as e:
        print(f'  ❌ {schema_file.name}: {e}')
        errors += 1
if errors:
    sys.exit(1)
print(f'All {len(list(schema_dir.glob(chr(42)+\".schema.json\")))} schemas validated.')
"
